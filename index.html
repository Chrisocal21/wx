<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wx" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- SEO -->
    <meta name="description" content="Weather, without the noise. A clean, beautiful, ad-free weather app." />
    <meta name="keywords" content="weather, forecast, clean weather app, ad-free weather, beautiful weather, hourly forecast, daily forecast, PWA weather" />
    <meta name="author" content="Wx" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wx.vercel.app/" />
    <meta property="og:title" content="Wx - Clean Weather" />
    <meta property="og:description" content="Weather, without the noise. A clean, beautiful, ad-free weather app." />
    <meta property="og:image" content="https://wx.vercel.app/icon-192.svg" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Wx - Clean Weather" />
    <meta name="twitter:description" content="Weather, without the noise. A clean, beautiful, ad-free weather app." />
    <meta name="twitter:image" content="https://wx.vercel.app/icon-192.svg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>Wx</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch((error) => console.log('Service Worker registration failed:', error));
        });
      }
    </script>
  </body>
</html>
